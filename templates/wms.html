<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced WMS Engine Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0a192f;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Top Header Navigation Section */
        .wms-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #233554;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        h1 {
            background: linear-gradient(135deg, #64ffda 0%, #48cbb0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            font-size: 30px;
            font-weight: 800;
        }

        /* SAFE BACK BUTTON STYLE */
        .btn-back {
            background: #112240;
            color: #64ffda;
            border: 1px solid #64ffda;
            padding: 10px 20px;
            font-size: 14px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(100, 255, 218, 0.1);
        }

        .btn-back:hover {
            background: #64ffda;
            color: #0a192f;
            box-shadow: 0 4px 20px rgba(100, 255, 218, 0.3);
            transform: translateY(-2px);
        }

        /* Dashboard Grid Layout */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background: #112240;
            border: 1px solid #233554;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .card h3 {
            color: #64ffda;
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 18px;
            border-bottom: 1px dashed #233554;
            padding-bottom: 10px;
        }

        .metric {
            font-size: 36px;
            font-weight: bold;
            color: #ffffff;
            margin: 15px 0;
        }

        .status-good {
            color: #64ffda;
            font-size: 14px;
            font-weight: 600;
        }

        .status-alert {
            color: #ff4a4a;
            font-size: 14px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="wms-header">
            <button class="btn-back" onclick="goBackToDashboard()">← Back to Sorter Dashboard</button>
            <h1>📦 Advanced WMS Engine</h1>
        </div>

        <div class="grid">
            <div class="card">
                <h3>Total Inventory Items</h3>
                <div class="metric">1,482</div>
                <div class="status-good">✓ Active SKU Catalog Synced</div>
            </div>

            <div class="card">
                <h3>Dispatched Orders Today</h3>
                <div class="metric">342</div>
                <div class="status-good">✓ 100% Sorted Labels Generated</div>
            </div>

            <div class="card">
                <h3>Warehouse Storage Capacity</h3>
                <div class="metric">78%</div>
                <div class="status-good">Optimal Rack Utilization</div>
            </div>

            <div class="card">
                <h3>System Status</h3>
                <div class="metric" style="color: #64ffda;">ONLINE</div>
                <div class="status-good">Cloud Integration Sync Successful</div>
            </div>
        </div>
    </div>

    <script>
    function goBackToDashboard() {
        // Agar dono files ek hi domain par chal rahi hain toh history use karega bina login session destroy kiye
        if (document.referrer && document.referrer.includes(window.location.host)) {
            window.history.back();
        } else {
            window.location.href = "/";
        }
    }
    </script>

</body>
</html>
