<!DOCTYPE html>
<html>

<head>

    <title>PDF SKU SORTER</title>

    <style>

        body{
            margin:0;
            padding:0;
            font-family:Arial;
            background:linear-gradient(
                135deg,
                #1e3c72,
                #2a5298
            );
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .box{

            background:white;
            width:450px;
            padding:40px;
            border-radius:20px;
            text-align:center;
            box-shadow:0px 0px 25px rgba(0,0,0,0.3);
        }

        h1{

            color:#2a5298;
            margin-bottom:30px;
        }

        input[type=file]{

            width:100%;
            padding:15px;
            border:2px dashed #2a5298;
            border-radius:10px;
            margin-bottom:20px;
        }

        button{

            width:100%;
            padding:15px;
            border:none;
            border-radius:10px;
            background:#2a5298;
            color:white;
            font-size:18px;
            font-weight:bold;
            cursor:pointer;
        }

        button:hover{

            background:#1e3c72;
        }

        #loading{

            margin-top:20px;
            display:none;
        }

        .bar{

            width:100%;
            height:25px;
            background:#ddd;
            border-radius:30px;
            overflow:hidden;
            margin-top:15px;
        }

        .progress{

            width:100%;
            height:100%;
            background:linear-gradient(
                90deg,
                #00c853,
                #64dd17
            );

            animation:loading 2s infinite;
        }

        @keyframes loading{

            0%{
                transform:translateX(-100%);
            }

            100%{
                transform:translateX(100%);
            }
        }

    </style>

</head>

<body>

<div class="box">

    <h1>PDF SKU SORTER</h1>

    <form
        action="/upload"
        method="POST"
        enctype="multipart/form-data"
        onsubmit="showLoading()"
    >

        <input
            type="file"
            name="pdf"
            accept=".pdf"
            required
        >

        <button type="submit">
            UPLOAD & SORT
        </button>

    </form>

    <div id="loading">

        <h3>
            PROCESSING PDF...
        </h3>

        <div class="bar">

            <div class="progress"></div>

        </div>

    </div>

</div>

<script>

function showLoading(){

    document.getElementById(
        "loading"
    ).style.display = "block";
}

</script>

</body>

</html>
