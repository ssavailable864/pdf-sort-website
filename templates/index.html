<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF SKU Sorter</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; line-height: 1.6; }
        .upload-box { border: 2px dashed #ccc; padding: 30px; text-align: center; cursor: pointer; background: #fafafa; border-radius: 8px; }
        .btn { background: #28a745; color: white; padding: 12px 20px; border: none; cursor: pointer; width: 100%; margin-top: 15px; font-size: 16px; border-radius: 4px; font-weight: bold; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        #progress-box { margin-top: 20px; display: none; }
        .progress-bar { width: 100%; background-color: #f3f3f3; border-radius: 4px; margin-top: 10px; }
        .progress-bar-fill { height: 20px; width: 0%; background-color: #28a745; text-align: center; line-height: 20px; color: white; border-radius: 4px; transition: width 0.2s; font-size: 12px; }
        #status { font-weight: bold; margin-bottom: 5px; color: #333; }
    </style>
</head>
<body>

    <h2>Bhai ka PDF SKU Sorter (Block-Anchor Edition)</h2>
    <p>Ab address wale 'Sector91' block honge aur strictly SKU heading ke paas se hi core SKU uthaya jayega!</p>
    
    <div class="upload-box" onclick="document.getElementById('pdfFile').click()">
        <p>Click here to upload your Shipping PDF</p>
        <input type="file" id="pdfFile" accept="application/pdf" style="display:none">
        <span id="fileName" style="color: #007bff; font-weight: bold;"></span>
    </div>

    <button id="processBtn" class="btn" disabled>Start Sorting Process</button>

    <div id="progress-box">
        <div id="status">Ready...</div>
        <div class="progress-bar">
            <div id="progress-fill" class="progress-bar-fill">0%</div>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        const fileInput = document.getElementById('pdfFile');
        const fileNameSpan = document.getElementById('fileName');
        const processBtn = document.getElementById('processBtn');
        const progressBox = document.getElementById('progress-box');
        const progressFill = document.getElementById('progress-fill');
        const statusDiv = document.getElementById('status');

        let selectedFile = null;

        fileInput.addEventListener('change', (e) => {
            if(e.target.files.length > 0) {
                selectedFile = e.target.files[0];
                fileNameSpan.innerText = selectedFile.name;
                processBtn.disabled = false;
            }
        });

        processBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            processBtn.disabled = true;
            progressBox.style.display = 'block';
            
            statusDiv.innerText = "Reading PDF File...";
            updateProgress(5);

            try {
                const arrayBuffer = await selectedFile.arrayBuffer();
                
                // Load for reading text
                const pdfDocForRead = await pdfjsLib.getDocument({ data: arrayBuffer.slice(0) }).promise;
                const totalPages = pdfDocForRead.numPages;

                let grouped = {};

                // 1. SCAN PAGES FOR SKU
                for (let i = 1; i <= totalPages; i++) {
                    statusDiv.innerText = `Scanning Label ${i}/${totalPages} for SKU...`;
                    
                    const page = await pdfDocForRead.getPage(i);
                    const textContent = await page.getTextContent();
                    const pageText = textContent.items.map(item => item.str).join('\n');
                    
                    let sku = extractSkuFromText(pageText);
                    
                    if (!grouped[sku]) grouped[sku] = [];
                    grouped[sku].push(i - 1); // 0-based page index

                    let percent = Math.floor((i / totalPages) * 45) + 5;
                    updateProgress(percent);
                }

                statusDiv.innerText = "Grouping & Sorting SKUs...";
                updateProgress(55);

                // Sort keys: Unknown stays at the end
                let sortedKeys = Object.keys(grouped).sort((a, b) => {
                    if (a === "UNKNOWN") return 1;
                    if (b === "UNKNOWN") return -1;
                    return a.localeCompare(b);
                });

                statusDiv.innerText = "Generating Sorted PDF in Browser (Hold on)...";
                
                // Load for writing/copying pages
                const srcPdfDoc = await PDFLib.PDFDocument.load(arrayBuffer);
                const outPdfDoc = await PDFLib.PDFDocument.create();

                // 2. BUILD NEW PDF
                for (let k = 0; k < sortedKeys.length; k++) {
                    let sku = sortedKeys[k];
                    let pageIndices = grouped[sku];

                    statusDiv.innerText = `Stitching SKU: ${sku} (${pageIndices.length} Labels)...`;

                    // Copy original label pages
                    const copiedPages = await outPdfDoc.copyPages(srcPdfDoc, pageIndices);
                    copiedPages.forEach(page => outPdfDoc.addPage(page));

                    // Add Summary Separator Page
                    const summaryPage = outPdfDoc.addPage([595, 842]); // A4 Size
                    
                    summaryPage.drawText(`SKU: ${sku}`, { x: 100, y: 500, size: 26 });
                    summaryPage.drawText(`TOTAL LABELS: ${pageIndices.length}`, { x: 100, y: 450, size: 22 });

                    let percent = Math.floor((k / sortedKeys.length) * 40) + 55;
                    updateProgress(percent);
                }

                statusDiv.innerText = "Finalizing PDF Download...";
                updateProgress(98);

                // Save and triggers download directly from browser
                const pdfBytes = await outPdfDoc.save();
                const blob = new Blob([pdfBytes], { type: "application/pdf" });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = "SORTED_" + selectedFile.name;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                updateProgress(100);
                statusDiv.innerHTML = `<span style="color:#28a745;">✓ Process Completed Successfully!</span> Your sorted file has been downloaded.`;
                processBtn.disabled = false;

            } catch (error) {
                console.error(error);
                statusDiv.innerText = "Error during processing: " + error.message;
                processBtn.disabled = false;
            }
        });

        function updateProgress(value) {
            progressFill.style.width = value + '%';
            progressFill.innerText = value + '%';
        }

        // ANCHOR EXTRACTION: ONLY EXTRACT TRULY RELEVANT STRINGS NEAR THE "SKU" BLOCK
        function extractSkuFromText(text) {
            if (!text) return "UNKNOWN";

            // Lines and exact words split
            const lines = text.split('\n').map(l => l.trim()).filter(l => l);
            const words = text.split(/[\s\n\t]+/).map(w => w.trim()).filter(w => w);

            // -----------------------------------------------------------------------
            // PRIORITY 1: STRICT ANCHORING (Look exactly under or next to "SKU" text)
            // -----------------------------------------------------------------------
            for (let i = 0; i < lines.length; i++) {
                let currentLine = lines[i].toUpperCase();
                
                // Agar exact line sirf "SKU" hai ya uski shuruat "SKU" se ho rhi h
                if (currentLine === "SKU" || currentLine.startsWith("SKU ")) {
                    // Check next line or tokens immediately below
                    if (i + 1 < lines.length) {
                        let candidate = lines[i + 1].trim();
                        let cleanCand = candidate.replace(/[:,-]/g, '');
                        let upperCand = cleanCand.toUpperCase();

                        // Agar candidate target SKU structures ke rules par sateek baithta h
                        if (
                            /^\d+_\d+$/.test(candidate) && !candidate.endsWith('_1') && !candidate.endsWith('_2') || // Format: 1403620329_44
                            /^\d{8,11}$/.test(candidate) && candidate.startsWith("108") ||                          // Format: 108123407
                            /^[A-Z]{2,6}[0-9]{2,6}$/i.test(cleanCand) && !upperCand.startsWith("FUUNG")            // Format: APCD07
                        ) {
                            return candidate;
                        }
                    }
                }
            }

            // -----------------------------------------------------------------------
            // PRIORITY 2: DIRECT SCAN PATTERN FALLBACKS (If lines array sequence varies)
            // -----------------------------------------------------------------------
            // 1. Long Underscore SKUs (e.g., 188042787_70)
            for (let word of words) {
                let matchUnderscore = word.match(/\d+_\d+/);
                if (matchUnderscore) {
                    let fullMatch = matchUnderscore[0];
                    if (!fullMatch.endsWith('_1') && !fullMatch.endsWith('_2')) {
                        return fullMatch;
                    }
                }
            }

            // 2. Pure Numeric 108 series SKUs (e.g., 108123407)
            for (let word of words) {
                if (/^\d{8,11}$/.test(word) && word.startsWith("108")) {
                    return word;
                }
            }

            // 3. Precise Alphanumeric SKU (e.g., APCD07) - strictly filtered to reject sector/address names
            for (let word of words) {
                let cleanWord = word.replace(/[:,-]/g, '');
                let upperWord = cleanWord.toUpperCase();

                // Exclude common address keywords like "SECTOR" to prevent picking "Sector91"
                if (upperWord.includes("SECTOR") || upperWord.includes("FUUNG") || upperWord.length > 12) continue;

                if (/^[A-Z]{2,6}[0-9]{2,6}$/i.test(cleanWord)) {
                    return cleanWord;
                }
            }

            return "UNKNOWN";
        }
    </script>
</body>
</html>
