<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meesho PDF SKU Sorter</title>
    <!-- PDF.js for Reading & PDF-Lib for Writing (100% Client Side) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <style>
        /* Premium Dark Blue Background */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #0a192f; /* Deep Dark Space Blue */
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* Top Moving Text Line (Styled for Dark Background) */
        .marquee-container {
            width: 100%;
            max-width: 650px;
            overflow: hidden;
            background: #112240; /* Darker navy block to blend with bg */
            border-radius: 20px;
            padding: 8px 0;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            border: 1px solid #233554;
        }

        .marquee-text {
            display: inline-block;
            white-space: nowrap;
            font-size: 13px;
            color: #64ffda; /* Neon Cyan text that pops in dark mode */
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            animation: marquee 15s linear infinite;
            padding-left: 100%;
        }

        @keyframes marquee {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }

        /* Center White Box Container */
        .main-card {
            background: #ffffff;
            max-width: 650px; 
            width: 100%;
            padding: 45px 35px; 
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            box-sizing: border-box;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .header-container {
            text-align: center;
            margin-bottom: 35px;
            border-bottom: 2px solid #f0f4f8;
            padding-bottom: 20px;
        }

        /* Unique Luxury Color Scheme for the Header */
        h2 { 
            background: linear-gradient(135deg, #0072ff 0%, #00c6ff 100%); /* Electric Sapphire Gradient */
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            font-size: 34px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        /* Dotted Upload Box tweaked to match the theme */
        .upload-box { 
            border: 2px dashed #0072ff; 
            padding: 50px 20px; 
            text-align: center; 
            cursor: pointer; 
            background: #f0f7ff; 
            border-radius: 14px; 
            transition: all 0.3s ease;
        }

        .upload-box:hover {
            background: #e1f0ff;
            border-color: #0052cc;
            transform: translateY(-2px);
        }

        .upload-box p {
            margin: 0 0 10px 0;
            font-size: 18px;
            color: #1e293b;
            font-weight: 600;
        }

        /* Matching Button Gradient */
        .btn { 
            background: linear-gradient(135deg, #0072ff 0%, #0052cc 100%); 
            color: white; 
            padding: 16px 24px; 
            border: none; 
            cursor: pointer; 
            width: 100%; 
            margin-top: 25px; 
            font-size: 17px; 
            border-radius: 8px; 
            font-weight: bold; 
            box-shadow: 0 4px 15px rgba(0, 114, 255, 0.3);
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: linear-gradient(135deg, #0052cc 0%, #0033aa 100%);
            box-shadow: 0 6px 22px rgba(0, 114, 255, 0.45);
        }

        .btn:disabled { 
            background: #e2e8f0; 
            color: #94a3b8;
            box-shadow: none;
            cursor: not-allowed; 
        }

        #progress-box { 
            margin-top: 30px; 
            display: none; 
            background: #f8fafc;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }

        .progress-bar { 
            width: 100%; 
            background-color: #e2e8f0; 
            border-radius: 20px; 
            margin-top: 12px; 
            overflow: hidden;
        }

        .progress-bar-fill { 
            height: 24px; 
            width: 0%; 
            background: linear-gradient(90deg, #38bdf8 0%, #3b82f6 100%); 
            text-align: center; 
            line-height: 24px; 
            color: white; 
            transition: width 0.2s ease; 
            font-size: 14px; 
            font-weight: bold;
        }

        #status { 
            font-weight: 600; 
            margin-bottom: 5px; 
            color: #334155; 
            font-size: 15px;
        }

        #fileName {
            display: block;
            margin-top: 10px;
            word-break: break-all;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <!-- Top Moving Text Line inside Dark Navy Bar -->
    <div class="marquee-container">
        <div class="marquee-text">Developed by Waghmare Small Service &nbsp;&bull;&nbsp; Premium PDF Automation Tool &nbsp;&bull;&nbsp; Developed by Waghmare Small Service</div>
    </div>

    <!-- Center White Box -->
    <div class="main-card">
        <div class="header-container">
            <h2>Meesho PDF SKU Sorter</h2>
        </div>
        
        <div class="upload-box" onclick="document.getElementById('pdfFile').click()">
            <p>Click here to upload your Shipping PDF</p>
            <input type="file" id="pdfFile" accept="application/pdf" style="display:none">
            <span id="fileName" style="color: #0072ff; font-weight: bold;"></span>
        </div>

        <button id="processBtn" class="btn" disabled>Start Sorting Process</button>

        <div id="progress-box">
            <div id="status">Ready...</div>
            <div class="progress-bar">
                <div id="progress-fill" class="progress-bar-fill">0%</div>
            </div>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        const fileInput = document.getElementById('pdfFile');
        const fileNameSpan = document.getElementById('fileName');
        const processBtn = document.getElementById('processBtn');
        const progressBox = document.getElementById('progress-box');
        const progressFill = document.getElementById('progress-fill');
        const statusDiv = document.getElementById('status');

        let selectedFile = null;

        fileInput.addEventListener('change', (e) => {
            if(e.target.files.length > 0) {
                selectedFile = e.target.files[0];
                fileNameSpan.innerText = selectedFile.name;
                processBtn.disabled = false;
            }
        });

        processBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            processBtn.disabled = true;
            progressBox.style.display = 'block';
            
            statusDiv.innerText = "Reading PDF File...";
            updateProgress(5);

            try {
                const arrayBuffer = await selectedFile.arrayBuffer();
                
                // Load for reading text
                const pdfDocForRead = await pdfjsLib.getDocument({ data: arrayBuffer.slice(0) }).promise;
                const totalPages = pdfDocForRead.numPages;

                let grouped = {};

                // 1. SCAN PAGES FOR SKU
                for (let i = 1; i <= totalPages; i++) {
                    statusDiv.innerText = `Scanning Label ${i}/${totalPages} for SKU...`;
                    
                    const page = await pdfDocForRead.getPage(i);
                    const textContent = await page.getTextContent();
                    const pageText = textContent.items.map(item => item.str).join('\n');
                    
                    let sku = extractSkuFromText(pageText);
                    
                    if (!grouped[sku]) grouped[sku] = [];
                    grouped[sku].push(i - 1); // 0-based page index

                    let percent = Math.floor((i / totalPages) * 45) + 5;
                    updateProgress(percent);
                }

                statusDiv.innerText = "Grouping & Sorting SKUs...";
                updateProgress(55);

                // Sort keys: Unknown stays at the end
                let sortedKeys = Object.keys(grouped).sort((a, b) => {
                    if (a === "UNKNOWN") return 1;
                    if (b === "UNKNOWN") return -1;
                    return a.localeCompare(b);
                });

                statusDiv.innerText = "Generating Sorted PDF in Browser (Hold on)...";
                
                // Load for writing/copying pages
                const srcPdfDoc = await PDFLib.PDFDocument.load(arrayBuffer);
                const outPdfDoc = await PDFLib.PDFDocument.create();

                // 2. BUILD NEW PDF
                for (let k = 0; k < sortedKeys.length; k++) {
                    let sku = sortedKeys[k];
                    let pageIndices = grouped[sku];

                    statusDiv.innerText = `Stitching SKU: ${sku} (${pageIndices.length} Labels)...`;

                    // Copy original label pages
                    const copiedPages = await outPdfDoc.copyPages(srcPdfDoc, pageIndices);
                    copiedPages.forEach(page => outPdfDoc.addPage(page));

                    // Add Summary Separator Page
                    const summaryPage = outPdfDoc.addPage([595, 842]); // A4 Size
                    
                    summaryPage.drawText(`SKU: ${sku}`, { x: 100, y: 500, size: 26 });
                    summaryPage.drawText(`TOTAL LABELS: ${pageIndices.length}`, { x: 100, y: 450, size: 22 });

                    let percent = Math.floor((k / sortedKeys.length) * 40) + 55;
                    updateProgress(percent);
                }

                statusDiv.innerText = "Finalizing PDF Download...";
                updateProgress(98);

                // Save and triggers download directly from browser
                const pdfBytes = await outPdfDoc.save();
                const blob = new Blob([pdfBytes], { type: "application/pdf" });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = "SORTED_" + selectedFile.name;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                updateProgress(100);
                statusDiv.innerHTML = `<span style="color:#28a745;">✓ Process Completed Successfully!</span> Your sorted file has been downloaded.`;
                processBtn.disabled = false;

            } catch (error) {
                console.error(error);
                statusDiv.innerText = "Error during processing: " + error.message;
                processBtn.disabled = false;
            }
        });

        function updateProgress(value) {
            progressFill.style.width = value + '%';
            progressFill.innerText = value + '%';
        }

        // ANCHOR EXTRACTION: ONLY EXTRACT TRULY RELEVANT STRINGS NEAR THE "SKU" BLOCK
        function extractSkuFromText(text) {
            if (!text) return "UNKNOWN";

            const lines = text.split('\n').map(l => l.trim()).filter(l => l);
            const words = text.split(/[\s\n\t]+/).map(w => w.trim()).filter(w => w);

            // PRIORITY 1: STRICT ANCHORING (Look exactly under or next to "SKU" text)
            for (let i = 0; i < lines.length; i++) {
                let currentLine = lines[i].toUpperCase();
                
                if (currentLine === "SKU" || currentLine.startsWith("SKU ")) {
                    if (i + 1 < lines.length) {
                        let candidate = lines[i + 1].trim();
                        let cleanCand = candidate.replace(/[:,-]/g, '');
                        let upperCand = cleanCand.toUpperCase();

                        if (
                            /^\d+_\d+$/.test(candidate) && !candidate.endsWith('_1') && !candidate.endsWith('_2') || 
                            /^\d{8,11}$/.test(candidate) && candidate.startsWith("108") ||                          
                            /^[A-Z]{2,6}[0-9]{2,6}$/i.test(cleanCand) && !upperCand.startsWith("FUUNG")            
                        ) {
                            return candidate;
                        }
                    }
                }
            }

            // PRIORITY 2: DIRECT SCAN PATTERN FALLBACKS
            for (let word of words) {
                let matchUnderscore = word.match(/\d+_\d+/);
                if (matchUnderscore) {
                    let fullMatch = matchUnderscore[0];
                    if (!fullMatch.endsWith('_1') && !fullMatch.endsWith('_2')) {
                        return fullMatch;
                    }
                }
            }

            for (let word of words) {
                if (/^\d{8,11}$/.test(word) && word.startsWith("108")) {
                    return word;
                }
            }

            for (let word of words) {
                let cleanWord = word.replace(/[:,-]/g, '');
                let upperWord = cleanWord.toUpperCase();

                if (upperWord.includes("SECTOR") || upperWord.includes("FUUNG") || upperWord.length > 12) continue;

                if (/^[A-Z]{2,6}[0-9]{2,6}$/i.test(cleanWord)) {
                    return cleanWord;
                }
            }

            return "UNKNOWN";
        }
    </script>
</body>
</html>
