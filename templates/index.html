<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF SKU Sorter</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; line-height: 1.6; }
        .upload-box { border: 2px dashed #ccc; padding: 30px; text-align: center; cursor: pointer; background: #fafafa; }
        .btn { background: #28a745; color: white; padding: 10px 20px; border: none; cursor: pointer; width: 100%; margin-top: 15px; font-size: 16px; }
        .btn:disabled { background: #ccc; }
        #progress-box { margin-top: 20px; display: none; }
        .progress-bar { width: 100%; background-color: #f3f3f3; border-radius: 4px; }
        .progress-bar-fill { height: 20px; width: 0%; background-color: #28a745; text-align: center; line-height: 20px; color: white; border-radius: 4px; transition: width 0.2s; }
        #status { font-weight: bold; margin-bottom: 5px; color: #333; }
    </style>
</head>
<body>

    <h2>Bhai ka PDF SKU Sorter (High-Speed)</h2>
    <p>78+ pages bhi ab aaram se bina crash hue process honge!</p>
    
    <div class="upload-box" onclick="document.getElementById('pdfFile').click()">
        <p>Click here to upload your Shipping PDF</p>
        <input type="file" id="pdfFile" accept="application/pdf" style="display:none">
        <span id="fileName"></span>
    </div>

    <button id="processBtn" class="btn" disabled>Start Sorting Process</button>

    <div id="progress-box">
        <div id="status">Ready...</div>
        <div class="progress-bar">
            <div id="progress-fill" class="progress-bar-fill">0%</div>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        const fileInput = document.getElementById('pdfFile');
        const fileNameSpan = document.getElementById('fileName');
        const processBtn = document.getElementById('processBtn');
        const progressBox = document.getElementById('progress-box');
        const progressFill = document.getElementById('progress-fill');
        const statusDiv = document.getElementById('status');

        let selectedFile = null;

        fileInput.addEventListener('change', (e) => {
            if(e.target.files.length > 0) {
                selectedFile = e.target.files[0];
                fileNameSpan.innerText = selectedFile.name;
                processBtn.disabled = false;
            }
        });

        processBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            processBtn.disabled = true;
            progressBox.style.display = 'block';
            
            statusDiv.innerText = "Reading PDF in Browser...";
            updateProgress(10);

            try {
                // Read PDF file as ArrayBuffer
                const arrayBuffer = await selectedFile.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                const totalPages = pdf.numPages;

                let pageMapping = []; // Format: [{pageIndex: 0, sku: '123'}, ...]

                // Browser ke andar fast loop chalao text nikalne ke liye
                for (let i = 1; i <= totalPages; i++) {
                    statusDiv.innerText = `Scanning Page ${i}/${totalPages} for SKU...`;
                    
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    const pageText = textContent.items.map(item => item.str).join('\n');
                    
                    // Frontend SKU Regex Logic (Same as Python)
                    let sku = extractSkuFromText(pageText);
                    pageMapping.push({ pageIndex: i - 1, sku: sku });

                    let percent = Math.floor((i / totalPages) * 50) + 10;
                    updateProgress(percent);
                }

                statusDiv.innerText = "Sending Data to Server for Sorting...";
                updateProgress(70);

                // Ab saara processed data backend ko bhejdo final PDF banane ke liye
                const formData = new FormData();
                formData.append('pdf', selectedFile);
                formData.append('mapping', JSON.stringify(pageMapping));

                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) throw new Error("Server error, please try again.");

                const result = await response.json();
                updateProgress(100);
                statusDiv.innerHTML = `COMPLETED! <a href="${result.file}" target="_blank" style="color:#28a745; font-weight:bold;">Click here to Download Sorted PDF</a>`;

            } catch (error) {
                console.error(error);
                statusDiv.innerText = "Error: " + error.message;
                processBtn.disabled = false;
            }
        });

        function updateProgress(value) {
            progressFill.style.width = value + '%';
            progressFill.innerText = value + '%';
        }

        // JavaScript helper to find SKU from lines
        function extractSkuFromText(text) {
            if (!text) return "UNKNOWN";
            const lines = text.split('\n').map(l => l.trim()).filter(l => l);
            
            for (let i = 0; i < lines.length; i++) {
                if (lines[i].toUpperCase() === "SKU") {
                    if (i + 1 < lines.length) {
                        let potentialSku = lines[i + 1];
                        if (potentialSku.length > 3 && potentialSku.toUpperCase() !== "SIZE") {
                            return potentialSku;
                        }
                    }
                }
                // Backup Regex
                if (lines[i].toUpperCase().includes("SKU")) {
                    let match = lines[i].match(/SKU[\s:]*([\w\d_-]+)/i);
                    if (match && match[1].length > 2) return match[1];
                }
            }
            return "UNKNOWN";
        }
    </script>
</body>
</html>
